<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Extension Test Suite</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { margin-bottom: 4px; }
    h1 + p { color: #666; margin-top: 0; }
    h3 { margin: 18px 0 8px; color: #555; border-bottom: 1px solid #e0e0e0; padding-bottom: 4px; }

    /* Controls */
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; margin: 16px 0; }
    .controls label { font-size: 13px; color: #555; }
    .controls input[type="text"] { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    button { padding: 8px 18px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-register { background: #4CAF50; }
    #btn-auth { background: #2196F3; }
    #btn-copy { background: #757575; font-size: 12px; padding: 6px 12px; }

    /* Summary checklist */
    #summary { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px; margin: 16px 0; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
    .test-row { display: flex; gap: 8px; }
    .test-icon { width: 18px; text-align: center; flex-shrink: 0; }
    .test-label { flex: 1; }
    .test-detail { color: #888; }
    .pass .test-icon { color: #2e7d32; }
    .pass .test-label { color: #2e7d32; }
    .fail .test-icon { color: #c62828; }
    .fail .test-label { color: #c62828; }
    .skip .test-icon { color: #9e9e9e; }
    .skip .test-label { color: #9e9e9e; }
    .pending .test-icon { color: #bdbdbd; }
    .pending .test-label { color: #bdbdbd; }
    .section-header { font-weight: 600; color: #333; margin-top: 6px; }

    /* Detail log */
    #log-section summary { cursor: pointer; font-weight: 600; color: #555; margin: 12px 0; }
    #log { background: #f5f5f5; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
    #log .error { color: #c62828; }
    #log .success { color: #2e7d32; }
    #log .status { color: #1565c0; font-style: italic; }
  </style>
</head>
<body>
  <h1>Sign Extension Test Suite</h1>
  <p>Tests previewSign, PRF, credProps, credProtect, credBlob, largeBlob, and ARKG signing.</p>

  <div class="controls">
    <div>
      <label for="cred-blob-input">credBlob</label><br>
      <input id="cred-blob-input" type="text" value="hello credBlob!" maxlength="32" size="20">
    </div>
    <div>
      <label for="large-blob-input">largeBlob data</label><br>
      <input id="large-blob-input" type="text" value="Test largeBlob data" size="24">
    </div>
    <div style="display:flex; gap:6px; align-self:end;">
      <button id="btn-register" onclick="runAll()">Register + Authenticate</button>
      <button id="btn-copy" onclick="copySummary()">Copy Summary</button>
    </div>
  </div>

  <div id="summary"></div>

  <details id="log-section">
    <summary>Detailed Log</summary>
    <pre id="log"></pre>
  </details>

  <script>
    "use strict";

    // =========================================================================
    // Test framework
    // =========================================================================

    const TESTS = {
      create: [
        { id: "create-ok", label: "MakeCredential succeeded" },
        { id: "previewsign-key", label: "previewSign.generatedKey" },
        { id: "previewsign-alg", label: "previewSign algorithm" },
        { id: "prf-enabled", label: "prf.enabled" },
        { id: "prf-mc-results", label: "prf.results (hmac-secret-mc)" },
        { id: "credprops-rk", label: "credProps.rk" },
        { id: "credprotect", label: "credProtect" },
        { id: "credblob-set", label: "credBlob stored" },
        { id: "largeblob-supported", label: "largeBlob.supported" },
      ],
      get: [
        { id: "get-ok", label: "GetAssertion succeeded" },
        { id: "previewsign-sig", label: "previewSign.signature" },
        { id: "prf-first", label: "prf.results.first" },
        { id: "prf-second", label: "prf.results.second" },
        { id: "credblob-get", label: "credBlob retrieved" },
        { id: "arkg-verify", label: "ARKG signature verified" },
        { id: "lb-write", label: "largeBlob written" },
      ],
      largeBlob: [
        { id: "lb-readback", label: "largeBlob read back verified" },
      ],
    };

    const results = {}; // id -> { status: "pass"|"fail"|"skip"|"pending", detail?: string }

    function initSummary() {
      for (const group of Object.values(TESTS)) {
        for (const t of group) {
          results[t.id] = { status: "pending", detail: "" };
        }
      }
      renderSummary();
    }

    function pass(id, detail) { results[id] = { status: "pass", detail: detail || "" }; renderSummary(); }
    function fail(id, detail) { results[id] = { status: "fail", detail: detail || "" }; renderSummary(); }
    function skip(id, detail) { results[id] = { status: "skip", detail: detail || "" }; renderSummary(); }

    const ICONS = { pass: "\u2713", fail: "\u2717", skip: "\u2013", pending: "\u00B7" };
    const SECTION_LABELS = { create: "MakeCredential", get: "GetAssertion + LargeBlob Write", largeBlob: "LargeBlob Read Back" };

    function renderSummary() {
      const el = document.getElementById("summary");
      let html = "";
      for (const [section, tests] of Object.entries(TESTS)) {
        html += `<div class="section-header">${SECTION_LABELS[section]}</div>`;
        for (const t of tests) {
          const r = results[t.id] || { status: "pending", detail: "" };
          const detail = r.detail ? ` <span class="test-detail">${esc(r.detail)}</span>` : "";
          html += `<div class="test-row ${r.status}"><span class="test-icon">${ICONS[r.status]}</span><span class="test-label">${esc(t.label)}${detail}</span></div>`;
        }
      }
      el.innerHTML = html;
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    function copySummary() {
      const lines = [`Sign Extension Test Results — ${new Date().toISOString().slice(0,10)}\n`];
      for (const [section, tests] of Object.entries(TESTS)) {
        lines.push(`${SECTION_LABELS[section]}:`);
        for (const t of tests) {
          const r = results[t.id] || { status: "pending", detail: "" };
          const tag = r.status === "pass" ? "PASS" : r.status === "fail" ? "FAIL" : r.status === "skip" ? "SKIP" : "----";
          const detail = r.detail ? ` — ${r.detail}` : "";
          lines.push(`  ${tag}  ${t.label}${detail}`);
        }
        lines.push("");
      }
      const text = lines.join("\n");
      navigator.clipboard.writeText(text).then(
        () => { const b = document.getElementById("btn-copy"); b.textContent = "Copied!"; setTimeout(() => b.textContent = "Copy Summary", 1500); },
        () => { prompt("Copy this:", text); }
      );
    }

    // =========================================================================
    // Logging
    // =========================================================================

    const logEl = document.getElementById("log");
    function log(msg, cls) {
      const span = document.createElement("span");
      if (cls) span.className = cls;
      span.textContent = msg + "\n";
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // =========================================================================
    // Utility functions
    // =========================================================================

    function hex(buf) {
      return Array.from(new Uint8Array(buf instanceof ArrayBuffer ? buf : buf.buffer || buf))
        .map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function b64url(buffer) {
      return btoa(String.fromCharCode(...new Uint8Array(buffer)))
        .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    function b64urlDecode(str) {
      str = str.replace(/-/g, "+").replace(/_/g, "/");
      while (str.length % 4) str += "=";
      return Uint8Array.from(atob(str), c => c.charCodeAt(0));
    }

    function toBytes(val) {
      if (val instanceof ArrayBuffer) return new Uint8Array(val);
      if (val instanceof Uint8Array) return val;
      if (typeof val === "string") return b64urlDecode(val);
      return null;
    }

    function byteLen(val) {
      const b = toBytes(val);
      return b ? b.length : 0;
    }

    // =========================================================================
    // CBOR encoder/decoder
    // =========================================================================

    function decodeCBOR(data) {
      const view = new DataView(data.buffer || data, data.byteOffset || 0, data.byteLength || data.length);
      let offset = 0;
      function readU8() { return view.getUint8(offset++); }
      function readU16() { const v = view.getUint16(offset); offset += 2; return v; }
      function readU32() { const v = view.getUint32(offset); offset += 4; return v; }
      function readInitial() {
        const b = readU8(); const major = b >> 5; const info = b & 0x1f; let val;
        if (info < 24) val = info;
        else if (info === 24) val = readU8();
        else if (info === 25) val = readU16();
        else if (info === 26) val = readU32();
        else if (info === 27) { val = readU32() * 0x100000000 + readU32(); }
        else throw new Error("CBOR: unsupported info " + info);
        return { major, val };
      }
      function decode() {
        const { major, val } = readInitial();
        switch (major) {
          case 0: return val;
          case 1: return -1 - val;
          case 2: { const buf = new Uint8Array(data.buffer || data, (data.byteOffset || 0) + offset, val); offset += val; return new Uint8Array(buf); }
          case 3: { const buf = new Uint8Array(data.buffer || data, (data.byteOffset || 0) + offset, val); offset += val; return new TextDecoder().decode(buf); }
          case 4: { const arr = []; for (let i = 0; i < val; i++) arr.push(decode()); return arr; }
          case 5: { const map = new Map(); for (let i = 0; i < val; i++) { map.set(decode(), decode()); } return map; }
          case 7: { if (val === 20) return false; if (val === 21) return true; if (val === 22) return null; throw new Error("CBOR: unsupported simple " + val); }
          default: throw new Error("CBOR: unsupported major " + major);
        }
      }
      return decode();
    }

    function encodeCBOR(value) {
      const parts = [];
      function writeInitial(major, val) {
        if (val < 24) parts.push(new Uint8Array([(major << 5) | val]));
        else if (val < 256) parts.push(new Uint8Array([(major << 5) | 24, val]));
        else if (val < 65536) { const b = new Uint8Array(3); b[0] = (major << 5) | 25; new DataView(b.buffer).setUint16(1, val); parts.push(b); }
        else if (val < 0x100000000) { const b = new Uint8Array(5); b[0] = (major << 5) | 26; new DataView(b.buffer).setUint32(1, val); parts.push(b); }
        else { const b = new Uint8Array(9); b[0] = (major << 5) | 27; const dv = new DataView(b.buffer); dv.setUint32(1, Math.floor(val / 0x100000000)); dv.setUint32(5, val >>> 0); parts.push(b); }
      }
      function encode(val) {
        if (typeof val === "number" && Number.isInteger(val)) { if (val >= 0) writeInitial(0, val); else writeInitial(1, -1 - val); }
        else if (val instanceof Uint8Array) { writeInitial(2, val.length); parts.push(val); }
        else if (typeof val === "string") { const e = new TextEncoder().encode(val); writeInitial(3, e.length); parts.push(e); }
        else if (Array.isArray(val)) { writeInitial(4, val.length); for (const i of val) encode(i); }
        else if (val instanceof Map) {
          const entries = [...val.entries()].sort((a, b) => { const am = a[0] >= 0 ? 0 : 1; const bm = b[0] >= 0 ? 0 : 1; if (am !== bm) return am - bm; return am === 0 ? a[0] - b[0] : b[0] - a[0]; });
          writeInitial(5, entries.length); for (const [k, v] of entries) { encode(k); encode(v); }
        }
        else if (typeof val === "boolean") parts.push(new Uint8Array([val ? 0xf5 : 0xf4]));
        else if (val === null) parts.push(new Uint8Array([0xf6]));
        else throw new Error("CBOR encode: unsupported type " + typeof val);
      }
      encode(value);
      const total = parts.reduce((s, p) => s + p.length, 0);
      const result = new Uint8Array(total); let off = 0;
      for (const p of parts) { result.set(p, off); off += p.length; }
      return result;
    }

    // =========================================================================
    // P-256 elliptic curve math (for ARKG)
    // =========================================================================

    const P256 = {
      p: BigInt("0xffffffff00000001000000000000000000000000ffffffffffffffffffffffff"),
      n: BigInt("0xffffffff00000000ffffffffffffffffbce6faada7179e84f3b9cac2fc632551"),
      a: BigInt("0xFFFFFFFF00000001000000000000000000000000FFFFFFFFFFFFFFFFFFFFFFFC"),
      b: BigInt("0x5AC635D8AA3A93E7B3EBBD55769886BC651D06B0CC53B0F63BCE3C3E27D2604B"),
      Gx: BigInt("0x6B17D1F2E12C4247F8BCE6E563A440F277037D812DEB33A0F4A13945D898C296"),
      Gy: BigInt("0x4FE342E2FE1A7F9B8EE7EB4A7C0F9E162BCE33576B315ECECBB6406837BF51F5"),
    };
    function modpos(a, m) { return ((a % m) + m) % m; }
    function modpow(base, exp, mod) { let r = 1n; base = modpos(base, mod); while (exp > 0n) { if ((exp & 1n) === 1n) r = r * base % mod; exp >>= 1n; base = base * base % mod; } return r; }
    function modinv(n, p) { return modpow(n, p - 2n, p); }
    function ecAdd(p1, p2) { if (!p1) return p2; if (!p2) return p1; const { p } = P256; let k; if (p1.x === p2.x) { if (p1.y === modpos(-p2.y, p)) return null; k = (3n * p1.x * p1.x + P256.a) * modinv(2n * p1.y, p) % p; } else { k = (p2.y - p1.y) * modinv(p2.x - p1.x, p) % p; } const xr = modpos(k * k - p1.x - p2.x, p); const yr = modpos(k * (p1.x - xr) - p1.y, p); return { x: xr, y: yr }; }
    function ecMul(pt, scalar) { let r = null; let base = pt; scalar = modpos(scalar, P256.n); while (scalar > 0n) { if (scalar & 1n) r = ecAdd(r, base); base = ecAdd(base, base); scalar >>= 1n; } return r; }
    const G = { x: P256.Gx, y: P256.Gy };
    function pointToUncompressed(pt) { const buf = new Uint8Array(65); buf[0] = 0x04; buf.set(bigintToBytes(pt.x, 32), 1); buf.set(bigintToBytes(pt.y, 32), 33); return buf; }
    function bytesToBigint(bytes) { let r = 0n; for (const b of bytes) r = (r << 8n) | BigInt(b); return r; }
    function bigintToBytes(val, len) { const b = new Uint8Array(len); for (let i = len - 1; i >= 0; i--) { b[i] = Number(val & 0xffn); val >>= 8n; } return b; }
    function arrayToBase64url(arr) { return btoa(String.fromCharCode(...arr)).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, ""); }

    // =========================================================================
    // Crypto helpers (SHA-256, HKDF, expand_message_xmd, hash_to_scalar)
    // =========================================================================

    async function sha256(data) { return new Uint8Array(await crypto.subtle.digest("SHA-256", data)); }
    function concatBytes(...arrays) { const t = arrays.reduce((s, a) => s + a.length, 0); const r = new Uint8Array(t); let o = 0; for (const a of arrays) { r.set(a, o); o += a.length; } return r; }
    function xorBytes(a, b) { const r = new Uint8Array(a.length); for (let i = 0; i < a.length; i++) r[i] = a[i] ^ b[i]; return r; }

    async function expandMessageXMD(msg, DST, lenInBytes) {
      const bInBytes = 32, sInBytes = 64, ell = Math.ceil(lenInBytes / bInBytes);
      const DST_prime = concatBytes(DST, new Uint8Array([DST.length]));
      const msgPrime = concatBytes(new Uint8Array(sInBytes), msg, new Uint8Array([(lenInBytes >> 8) & 0xff, lenInBytes & 0xff]), new Uint8Array([0x00]), DST_prime);
      const b0 = await sha256(msgPrime);
      const b = [b0]; b.push(await sha256(concatBytes(b0, new Uint8Array([0x01]), DST_prime)));
      for (let i = 2; i <= ell; i++) b.push(await sha256(concatBytes(xorBytes(b[0], b[i - 1]), new Uint8Array([i]), DST_prime)));
      return concatBytes(...b.slice(1)).slice(0, lenInBytes);
    }

    async function hashToScalar(msg, DST) {
      const uniformBytes = await expandMessageXMD(msg, DST, 48);
      return modpos(bytesToBigint(uniformBytes), P256.n);
    }

    // =========================================================================
    // ARKG-P256 key derivation
    // =========================================================================

    const DST_EXT = new TextEncoder().encode("ARKG-P256");

    function parseArkgSeed(coseKey) {
      const pkBl = coseKey.get(-1), pkKem = coseKey.get(-2);
      if (!pkBl || !pkKem) throw new Error("Missing pkBl or pkKem");
      return { pkBl: coseEc2ToPoint(pkBl), pkKem: coseEc2ToPoint(pkKem) };
    }
    function coseEc2ToPoint(k) { const x = k.get(-2), y = k.get(-3); return { x: bytesToBigint(x), y: bytesToBigint(y) }; }

    async function arkgDerivePublicKey(seed, ikm, ctx) {
      const ctxPrime = concatBytes(new Uint8Array([ctx.length]), ctx);
      const ctxKem = concatBytes(new TextEncoder().encode("ARKG-Derive-Key-KEM."), ctxPrime);
      const ctxBl = concatBytes(new TextEncoder().encode("ARKG-Derive-Key-BL."), ctxPrime);
      const [ikmTau, c] = await hmacKemEncaps(seed.pkKem, ikm, ctxKem);
      const tau = await hashToScalar(new Uint8Array(ikmTau), concatBytes(new TextEncoder().encode("ARKG-BL-EC."), DST_EXT, ctxBl));
      return { publicKey: ecAdd(seed.pkBl, ecMul(G, tau)), keyHandle: new Uint8Array(c) };
    }

    async function hmacKemEncaps(pkKem, ikm, ctx) {
      const DST_aug = new TextEncoder().encode("ARKG-ECDH.ARKG-P256");
      const ephSk = await hashToScalar(ikm, concatBytes(new TextEncoder().encode("ARKG-KEM-ECDH-KG."), DST_aug));
      const ephPk = ecMul(G, ephSk);
      const pkKemCryptoKey = await crypto.subtle.importKey("raw", pointToUncompressed(pkKem), { name: "ECDH", namedCurve: "P-256" }, false, []);
      const ephSkCryptoKey = await crypto.subtle.importKey("jwk", { kty: "EC", crv: "P-256", x: arrayToBase64url(bigintToBytes(ephPk.x, 32)), y: arrayToBase64url(bigintToBytes(ephPk.y, 32)), d: arrayToBase64url(bigintToBytes(ephSk, 32)) }, { name: "ECDH", namedCurve: "P-256" }, false, ["deriveBits"]);
      const kPrime = new Uint8Array(await crypto.subtle.deriveBits({ name: "ECDH", public: pkKemCryptoKey }, ephSkCryptoKey, 256));
      const cPrime = pointToUncompressed(ephPk);
      const macInfo = concatBytes(new TextEncoder().encode("ARKG-KEM-HMAC-mac."), DST_aug, ctx);
      const sharedInfo = concatBytes(new TextEncoder().encode("ARKG-KEM-HMAC-shared."), DST_aug, ctx);
      const hkdfKey = await crypto.subtle.importKey("raw", kPrime, { name: "HKDF" }, false, ["deriveBits", "deriveKey"]);
      const mk = await crypto.subtle.deriveKey({ name: "HKDF", hash: "SHA-256", salt: new Uint8Array([]), info: macInfo }, hkdfKey, { name: "HMAC", hash: "SHA-256", length: 256 }, false, ["sign"]);
      const t = new Uint8Array(await crypto.subtle.sign("HMAC", mk, cPrime)).slice(0, 16);
      const k = new Uint8Array(await crypto.subtle.deriveBits({ name: "HKDF", hash: "SHA-256", salt: new Uint8Array([]), info: sharedInfo }, hkdfKey, kPrime.length * 8));
      return [k, concatBytes(t, cPrime)];
    }

    function encodeCoseSignArgs(alg, arkgKh, ctx) { const m = new Map(); m.set(3, alg); m.set(-1, arkgKh); m.set(-2, ctx); return encodeCBOR(m); }

    // Raw ECDSA P-256 verification (pre-hashed message, no double-hashing)
    // WebCrypto always hashes before verifying; the authenticator signs a pre-hashed TBS,
    // so we need raw verification.
    function verifyEcdsaP256Raw(pubKeyPoint, signature, msgHash) {
      // Parse signature: try raw r||s (64 bytes) or DER
      let r, s;
      const sigBytes = toBytes(signature);
      if (sigBytes.length === 64) {
        r = bytesToBigint(sigBytes.slice(0, 32));
        s = bytesToBigint(sigBytes.slice(32));
      } else {
        // DER decode
        const parsed = parseDerSignature(sigBytes);
        if (!parsed) return false;
        r = parsed.r; s = parsed.s;
      }

      if (r < 1n || r >= P256.n || s < 1n || s >= P256.n) return false;
      const z = bytesToBigint(toBytes(msgHash).slice(0, 32));
      const sInv = modinv(s, P256.n);
      const u1 = modpos(z * sInv, P256.n);
      const u2 = modpos(r * sInv, P256.n);
      const p = ecAdd(ecMul(G, u1), ecMul(pubKeyPoint, u2));
      if (!p) return false;
      return modpos(p.x, P256.n) === r;
    }

    function parseDerSignature(der) {
      try {
        if (der[0] !== 0x30) return null;
        let offset = 2; // skip SEQUENCE tag + length
        if (der[1] & 0x80) offset += (der[1] & 0x7f); // long form length
        // r
        if (der[offset] !== 0x02) return null;
        const rLen = der[offset + 1]; offset += 2;
        const rBytes = der.slice(offset, offset + rLen); offset += rLen;
        // s
        if (der[offset] !== 0x02) return null;
        const sLen = der[offset + 1]; offset += 2;
        const sBytes = der.slice(offset, offset + sLen);
        return { r: bytesToBigint(rBytes), s: bytesToBigint(sBytes) };
      } catch { return null; }
    }

    // =========================================================================
    // State
    // =========================================================================

    let regResult = null; // { credentialId, extResults }

    function waitForUserClick(label) {
      return new Promise(resolve => {
        const btn = document.createElement("button");
        btn.textContent = label;
        btn.style.cssText = "background:#FF9800;margin:8px 0;";
        btn.onclick = () => { btn.remove(); resolve(); };
        document.getElementById("summary").after(btn);
        log("Click '" + label + "' to continue...", "status");
      });
    }

    // =========================================================================
    // Main test flow
    // =========================================================================

    async function runAll() {
      logEl.textContent = "";
      initSummary();
      document.getElementById("btn-register").disabled = true;

      try {
        await doRegister();
        if (regResult) {
          await doAuthenticate();
          // largeBlob read-back needs a fresh user gesture (Safari requires it).
          // Show a button and wait for click.
          if (regResult?.largeBlobWrittenData) {
            await waitForUserClick("Verify LargeBlob Read Back");
          }
          await doLargeBlobReadBack();
        }
      } catch (e) {
        log("Fatal: " + e.message, "error");
        log(e.stack || "", "error");
      } finally {
        document.getElementById("btn-register").disabled = false;
      }
    }

    // =========================================================================
    // 1. MakeCredential
    // =========================================================================

    async function doRegister() {
      log("=== MakeCredential ===", "status");
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const userId = crypto.getRandomValues(new Uint8Array(16));
      const prfSalt1 = crypto.getRandomValues(new Uint8Array(32));
      const prfSalt2 = crypto.getRandomValues(new Uint8Array(32));
      const credBlobText = document.getElementById("cred-blob-input").value;

      const options = {
        publicKey: {
          rp: { id: location.hostname, name: "Sign Extension Test" },
          user: { id: userId, name: "testuser@example.com", displayName: "Test User" },
          challenge,
          pubKeyCredParams: [{ type: "public-key", alg: -7 }],
          authenticatorSelection: { residentKey: "required", userVerification: "required" },
          timeout: 120000,
          extensions: {
            previewSign: { generateKey: { algorithms: [-65539] } },
            hmacCreateSecret: true,
            credProps: true,
            credentialProtectionPolicy: "userVerificationRequired",
            prf: { eval: { first: prfSalt1.buffer, second: prfSalt2.buffer } },
            credBlob: new TextEncoder().encode(credBlobText),
            largeBlob: { support: "preferred" },
          },
        },
      };

      log("Touch your security key...", "status");
      let credential;
      try {
        credential = await navigator.credentials.create(options);
      } catch (e) {
        fail("create-ok", e.message);
        log("MakeCredential failed: " + e.message, "error");
        return;
      }

      pass("create-ok");
      log("Credential ID: " + b64url(credential.rawId), "success");

      const ext = credential.getClientExtensionResults
        ? credential.getClientExtensionResults()
        : (credential.clientExtensionResults || {});
      log("clientExtensionResults: " + JSON.stringify(ext, null, 2));

      // Check each extension — previewSign requires non-empty keyHandle AND non-zero algorithm
      const psKey = ext.previewSign?.generatedKey;
      const psKeyValid = psKey && byteLen(psKey.keyHandle) > 0 && psKey.algorithm !== 0;
      if (psKeyValid) {
        pass("previewsign-key", `kh=${byteLen(psKey.keyHandle)}B pk=${byteLen(psKey.publicKey)}B`);
        pass("previewsign-alg", `${psKey.algorithm}`);
      } else if (psKey && psKey.algorithm === 0) {
        skip("previewsign-key", "previewSign not enabled on this key");
        skip("previewsign-alg", "previewSign not enabled on this key");
      } else {
        fail("previewsign-key"); fail("previewsign-alg");
      }

      if (ext.prf?.enabled === true) pass("prf-enabled"); else fail("prf-enabled", String(ext.prf?.enabled));
      if (ext.prf?.results?.first) pass("prf-mc-results", `first=${byteLen(ext.prf.results.first)}B`); else skip("prf-mc-results", "no hmac-secret-mc");
      if (ext.credProps?.rk != null) pass("credprops-rk", `rk=${ext.credProps.rk}`); else fail("credprops-rk");
      if (ext.credentialProtectionPolicy != null) pass("credprotect", `level ${ext.credentialProtectionPolicy}`);
      else skip("credprotect", "in attestationObject, not surfaced in clientExtensionResults");
      if (ext.credBlob === true) pass("credblob-set"); else fail("credblob-set", String(ext.credBlob));
      if (ext.largeBlob?.supported === true) pass("largeblob-supported"); else skip("largeblob-supported", ext.largeBlob?.supported === false ? "not supported" : "not in results");

      regResult = { credentialId: new Uint8Array(credential.rawId), extResults: ext };
    }

    // =========================================================================
    // 2. GetAssertion
    // =========================================================================

    async function doAuthenticate() {
      if (!regResult) return;
      log("\n=== GetAssertion ===", "status");

      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const prfSalt1 = crypto.getRandomValues(new Uint8Array(32));
      const prfSalt2 = crypto.getRandomValues(new Uint8Array(32));
      const tbsRaw = new TextEncoder().encode("Hello, previewSign v4!");
      const tbsHash = new Uint8Array(await crypto.subtle.digest("SHA-256", tbsRaw));
      const largeBlobTestData = document.getElementById("large-blob-input").value + " @ " + new Date().toISOString();

      // Build previewSign signByCredential with ARKG (only if MakeCredential returned valid previewSign data)
      const credIdB64 = b64url(regResult.credentialId);
      const signByCredential = {};
      let derivedPk = null;
      const ps = regResult.extResults.previewSign;
      const psValid = ps?.generatedKey && byteLen(ps.generatedKey.keyHandle) > 0 && ps.generatedKey.algorithm !== 0;

      if (psValid) {
        try {
          const origKh = toBytes(ps.generatedKey.keyHandle);
          const pkBytes = toBytes(ps.generatedKey.publicKey);
          const seed = parseArkgSeed(decodeCBOR(pkBytes));
          const arkgIkm = crypto.getRandomValues(new Uint8Array(32));
          const arkgCtx = new TextEncoder().encode("previewSign-test");
          const derived = await arkgDerivePublicKey(seed, arkgIkm, arkgCtx);
          derivedPk = derived.publicKey;
          const additionalArgs = encodeCoseSignArgs(-65539, derived.keyHandle, arkgCtx);
          signByCredential[credIdB64] = { keyHandle: origKh, tbs: tbsHash, additionalArgs };
          log("ARKG key derived, additionalArgs=" + additionalArgs.length + "B");
        } catch (e) {
          log("ARKG derivation failed: " + e.message, "error");
        }
      } else {
        log("Skipping previewSign in GetAssertion (not enabled on this key)");
      }

      const options = {
        publicKey: {
          rpId: location.hostname,
          challenge,
          allowCredentials: [{ type: "public-key", id: regResult.credentialId }],
          userVerification: "preferred",
          timeout: 120000,
          extensions: Object.assign(
            {
              prf: { eval: { first: prfSalt1.buffer, second: prfSalt2.buffer } },
              getCredBlob: true,
              largeBlob: { write: new TextEncoder().encode(largeBlobTestData) },
            },
            psValid ? { previewSign: { signByCredential } } : {}
          ),
        },
      };

      log("Touch your security key...", "status");
      let assertion;
      try {
        assertion = await navigator.credentials.get(options);
      } catch (e) {
        fail("get-ok", e.message);
        log("GetAssertion failed: " + e.message, "error");
        return;
      }

      pass("get-ok");
      const ext = assertion.getClientExtensionResults
        ? assertion.getClientExtensionResults()
        : (assertion.clientExtensionResults || {});
      log("clientExtensionResults: " + JSON.stringify(ext, null, 2));

      // Check extensions
      if (ext.previewSign?.signature) {
        const sigBytes = toBytes(ext.previewSign.signature);
        pass("previewsign-sig", `${sigBytes?.length || 0} bytes`);
      } else if (!psValid) {
        skip("previewsign-sig", "previewSign not enabled on this key");
      } else {
        fail("previewsign-sig");
      }

      if (ext.prf?.results?.first) pass("prf-first", `${byteLen(ext.prf.results.first)} bytes`); else fail("prf-first");
      if (ext.prf?.results?.second) pass("prf-second", `${byteLen(ext.prf.results.second)} bytes`); else fail("prf-second");

      if (ext.credBlob != null) {
        const blobBytes = toBytes(ext.credBlob);
        if (blobBytes) {
          const blobText = new TextDecoder().decode(blobBytes);
          pass("credblob-get", `"${blobText}" (${blobBytes.length}B)`);
        } else {
          pass("credblob-get", String(ext.credBlob));
        }
      } else {
        fail("credblob-get");
      }

      // ARKG signature verification (raw ECDSA — authenticator signs pre-hashed TBS)
      if (derivedPk && ext.previewSign?.signature) {
        try {
          const valid = verifyEcdsaP256Raw(derivedPk, ext.previewSign.signature, tbsHash);
          if (valid) pass("arkg-verify"); else fail("arkg-verify", "signature invalid");
        } catch (e) {
          fail("arkg-verify", e.message);
        }
      } else if (!psValid) {
        skip("arkg-verify", "previewSign not enabled on this key");
      } else {
        skip("arkg-verify", "no previewSign signature or derived key");
      }

      // largeBlob write result
      if (ext.largeBlob?.written === true) {
        pass("lb-write");
        regResult.largeBlobWrittenData = largeBlobTestData;  // save for read-back verification
      } else if (ext.largeBlob?.written === false) {
        fail("lb-write", "write failed");
      } else if (!regResult.extResults.largeBlob?.supported) {
        skip("lb-write", "largeBlob not supported");
      } else {
        fail("lb-write", "not in results");
      }
    }

    // =========================================================================
    // 3. LargeBlob read-back (auto-runs after authenticate to verify write)
    // =========================================================================

    async function doLargeBlobReadBack() {
      if (!regResult?.largeBlobWrittenData) {
        skip("lb-readback", "no largeBlob write to verify");
        return;
      }

      log("\n=== LargeBlob Read Back ===", "status");
      try {
        log("Reading largeBlob to verify write...", "status");
        const opts = {
          publicKey: {
            rpId: location.hostname,
            challenge: crypto.getRandomValues(new Uint8Array(32)),
            allowCredentials: [{ type: "public-key", id: regResult.credentialId }],
            userVerification: "preferred",
            timeout: 120000,
            extensions: { largeBlob: { read: true } },
          },
        };

        log("Touch your security key...", "status");
        const r = await navigator.credentials.get(opts);
        const ext = r.getClientExtensionResults ? r.getClientExtensionResults() : {};
        const blob = ext.largeBlob?.blob;
        if (blob) {
          const readBack = new TextDecoder().decode(toBytes(blob));
          if (readBack === regResult.largeBlobWrittenData) {
            pass("lb-readback", `"${readBack.slice(0, 40)}"`);
          } else {
            fail("lb-readback", `mismatch: got "${readBack.slice(0, 40)}"`);
          }
        } else {
          fail("lb-readback", "no blob returned");
        }
      } catch (e) {
        fail("lb-readback", e.message);
      }
    }

    // Initialize
    initSummary();
  </script>
</body>
</html>
